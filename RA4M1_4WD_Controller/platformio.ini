; =============================================================================
;  PlatformIO Project Configuration
;  RA4M1 4WD Hoverboard Controller
;  
;  Reads HOTRC DS650 RC receiver PWM signals and sends UART commands
;  to two hoverboard controllers (front + rear) for 4WD operation.
;
;  Board: Arduino UNO R4 Minima (Renesas RA4M1)
; =============================================================================

[platformio]
include_dir = include
src_dir     = src

[env:uno_r4_minima]
platform        = renesas-ra
board           = uno_r4_minima
framework       = arduino

; Serial Monitor settings
monitor_speed   = 115200
monitor_filters = direct

build_flags =
    -D ARDUINO_UNO_R4_MINIMA
    -Wall
    -Os

; Optional: Upload protocol (default is auto-detected)
; upload_protocol = sam-ba
